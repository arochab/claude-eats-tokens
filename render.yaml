services:
  - type: web
    name: claude-eats-tokens
    runtime: python
    plan: free
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PUSH_SECRET
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GIST_ID
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: LS_WEBHOOK_SECRET
        sync: false
      - key: LS_LINK_SECRET
        sync: false
      - key: LS_CHECKOUT_URL
        sync: false
