<!DOCTYPE html>
<html lang="fr"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Réinitialisation — Claude Eats Tokens</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#1A1915;color:#F0EEE6;display:flex;min-height:100vh;margin:0;align-items:center;justify-content:center;text-align:center;padding:24px}
.box{max-width:340px}
h1{font-size:20px;font-weight:500;margin:0 0 12px}
p{color:#9A988C;font-size:14px;line-height:1.5}
.s{display:inline-block;margin-top:16px;padding:6px 14px;border-radius:999px;background:rgba(126,158,109,.2);color:#aacc96;font-size:13px}
a.btn{display:inline-block;margin-top:20px;background:#CC785C;color:#fff;text-decoration:none;padding:13px 24px;border-radius:12px;font-weight:600}
</style></head>
<body><div class="box">
<h1>🧹 Nettoyage en cours…</h1>
<p id="msg">Suppression des anciennes versions en cache…</p>
<div class="s" id="status">Patiente 2 secondes</div>
<div><a class="btn" id="go" href="./index.html" style="display:none">Ouvrir l'app à jour →</a></div>
</div>
<script>
(async function(){
  try {
    // 1) désinscrit TOUS les service workers
    if ('serviceWorker' in navigator){
      const regs = await navigator.serviceWorker.getRegistrations();
      for (const r of regs){ await r.unregister(); }
    }
    // 2) vide TOUS les caches
    if ('caches' in window){
      const keys = await caches.keys();
      for (const k of keys){ await caches.delete(k); }
    }
    document.getElementById('msg').textContent = "C'est propre. Tu peux ouvrir l'app à jour.";
    document.getElementById('status').textContent = "✓ Réinitialisé";
    const go = document.getElementById('go');
    go.style.display = 'inline-block';
    // redirection auto après 1,5s vers l'app avec cache-busting
    setTimeout(function(){ window.location.href = './index.html?fresh=' + Date.now(); }, 1500);
  } catch(e){
    document.getElementById('msg').textContent = "Erreur : " + e;
  }
})();
</script>
</body></html>
